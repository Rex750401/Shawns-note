<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ 軒軒的成長筆記-電子登記系統 ⭐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .custom-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fee2e2' fill-opacity='0.4'%3E%3Cpath d='M30 15V0H0v30h15v30h30V30h15V0H30zm0 15H15V15h15v15zm15 0H30V15h15v15zM15 45h15V30H15v15zm30 0H30V30h15v15z'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="bg-amber-50 min-h-screen py-6 px-4 font-sans custom-pattern">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl border-4 border-orange-400 overflow-hidden relative">
        <!-- 頁首與設定按鈕 -->
        <div class="bg-gradient-to-r from-purple-500 to-pink-500 p-6 text-center text-white relative">
            <button id="openSettings" type="button" class="absolute top-4 right-4 text-white hover:text-yellow-200 transition text-xl">
                <i class="fa-solid fa-gear"></i>
            </button>
            <h1 class="text-2xl font-bold tracking-wide">⭐ 軒軒的成長筆記 ⭐</h1>
            <p class="text-sm opacity-90 mt-1">小小責任家每日電子登記系統</p>
        </div>

        <!-- 表單開始 -->
        <form id="logForm" class="p-6 space-y-6">
            <!-- 日期與本日亮點 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">選擇日期</label>
                    <input type="date" id="logDate" class="w-full p-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">本日亮點 (Notion標題)</label>
                    <input type="text" id="todayHighlight" placeholder="例如：自己穿衣服大成功！" class="w-full p-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 outline-none" required>
                </div>
            </div>

            <!-- 良好行為勾選區 -->
            <div>
                <h2 class="text-lg font-bold text-green-700 mb-3 border-b-2 border-green-200 pb-1">
                    <i class="fa-solid fa-star text-yellow-500 mr-1"></i> 良好行為紀錄 (完成請勾選)
                </h2>
                <div class="space-y-3" id="goodBehaviors">
                    <label class="flex items-center p-3 bg-blue-50 rounded-xl border border-blue-200 cursor-pointer hover:bg-blue-100 transition">
                        <input type="checkbox" value="1" class="behavior-checkbox w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-3 text-sm font-medium text-gray-700">1. 早上自己穿好衣服 (+1⭐)</span>
                    </label>
                    <label class="flex items-center p-3 bg-blue-50 rounded-xl border border-blue-200 cursor-pointer hover:bg-blue-100 transition">
                        <input type="checkbox" value="1" class="behavior-checkbox w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-3 text-sm font-medium text-gray-700">2. 自己刷牙洗臉上廁所 (+1⭐)</span>
                    </label>
                    <label class="flex items-center p-3 bg-blue-50 rounded-xl border border-blue-200 cursor-pointer hover:bg-blue-100 transition">
                        <input type="checkbox" value="1" class="behavior-checkbox w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-3 text-sm font-medium text-gray-700">3. 飯後餐具放進水槽 (+1⭐)</span>
                    </label>
                    <label class="flex items-center p-3 bg-blue-50 rounded-xl border border-blue-200 cursor-pointer hover:bg-blue-100 transition">
                        <input type="checkbox" value="1" class="behavior-checkbox w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-3 text-sm font-medium text-gray-700">4. 玩完後自己收玩具 (+1⭐)</span>
                    </label>
                    <label class="flex items-center p-3 bg-blue-50 rounded-xl border border-blue-200 cursor-pointer hover:bg-blue-100 transition">
                        <input type="checkbox" value="1" class="behavior-checkbox w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-3 text-sm font-medium text-gray-700">5. 將髒衣服放入洗衣籃 (+1⭐)</span>
                    </label>
                    <label class="flex items-center p-3 bg-pink-50 rounded-xl border border-pink-200 cursor-pointer hover:bg-pink-100 transition">
                        <input type="checkbox" value="1" class="behavior-checkbox w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-3 text-sm font-medium text-gray-700">6. 用語言表達需求/沒哭鬧 (+1⭐)</span>
                    </label>
                    <label class="flex items-center p-3 bg-pink-50 rounded-xl border border-pink-200 cursor-pointer hover:bg-pink-100 transition">
                        <input type="checkbox" value="1" class="behavior-checkbox w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-3 text-sm font-medium text-gray-700">7. 主動說請、謝謝、對不起 (+1⭐)</span>
                    </label>
                    <label class="flex items-center p-3 bg-pink-50 rounded-xl border border-pink-200 cursor-pointer hover:bg-pink-100 transition">
                        <input type="checkbox" value="1" class="behavior-checkbox w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-3 text-sm font-medium text-gray-700">8. 接受輸了遊戲不發脾氣 (+1⭐)</span>
                    </label>
                    <div class="pt-2">
                        <label class="block text-sm font-bold text-gray-700 mb-1">額外表現加分（手動輸入星星數）</label>
                        <input type="number" id="extraStars" min="0" value="0" class="w-full p-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 outline-none">
                    </div>
                </div>
            </div>

            <!-- 獎勵兌換扣點區 (已修改為最新獎勵清單) -->
            <div class="bg-red-50 border-2 border-red-200 rounded-xl p-4 space-y-3">
                <h3 class="text-md font-bold text-red-700 flex items-center">
                    <i class="fa-solid fa-gift mr-1.5 text-red-500"></i> 🎁 獎勵兌換與扣點設定
                </h3>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">選擇要兌換的獎勵</label>
                        <select id="rewardPreset" class="w-full p-2 border-2 border-red-300 rounded-lg focus:border-red-500 outline-none bg-white text-sm">
                            <option value="none" data-stars="0">-- 今天沒有兌換獎勵 --</option>
                            
                            <!-- 💡 提示：若您未來想增刪項目，只需複製下方任一行，並修改 data-stars(扣星數) 與文字內容即可 -->
                            <optgroup label="✨ 小獎勵 (5-15 顆星)">
                                
                                <option value="snack" data-stars="10">🍬 【10⭐】兌換一份美味小點心</option>
                                <option value="cartoon" data-stars="10">📺 【15⭐】看 15 分鐘 IPAD/電視</option>
                                <option value="icecream" data-stars="15">🍦 【15⭐】兌換一球冰淇淋</option>
                                <option value="toy_small" data-stars="15">🚗 【15⭐】兌換一份小玩具</option>
                            </optgroup>

                            <optgroup label="🎁 大獎勵 (30-50 顆星)">
                                <option value="dinner" data-stars="30">🍕 【30⭐】決定今天晚餐吃什麼</option>
                                <option value="sleep" data-stars="30">⏰ 【30⭐】延長 30 分鐘遊戲時間 / 晚睡</option>
                                <option value="picnic" data-stars="30">🧺 【30⭐】看 30 分鐘 IPAD/電視</option>
                                <option value="park" data-stars="50">🎡 【50⭐】去親子館或遊樂園玩一次</option>                                
                            </optgroup>
                            
                            <option value="custom" data-stars="0">✏️ 自訂其他獎勵 (手動填寫項目與扣點)</option>
                        </select>
                    </div>

                    <!-- 自訂獎勵輸入框 (選擇自訂時顯示) -->
                    <div id="customRewardGroup" class="hidden">
                        <label class="block text-xs font-bold text-gray-600 mb-1">自訂獎勵名稱</label>
                        <input type="text" id="customRewardName" placeholder="例如：去便利商店買軟糖" class="w-full p-2 border-2 border-red-300 rounded-lg focus:border-red-500 outline-none text-sm bg-white">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">扣除星星數量 (⭐)</label>
                        <input type="number" id="deductStars" min="0" value="0" class="w-full p-2 border-2 border-red-300 rounded-lg focus:border-red-500 outline-none font-bold text-red-600 bg-white">
                    </div>
                </div>
            </div>

            <!-- 星星與總累積即時統計 -->
            <div class="space-y-2">
                <div class="bg-yellow-100 border-2 border-yellow-300 rounded-xl p-4 flex justify-between items-center">
                    <span class="text-md font-bold text-gray-700"><i class="fa-solid fa-calculator text-amber-500 mr-1"></i> 今日淨得星星：</span>
                    <span id="todayTotal" class="text-3xl font-black text-orange-600">0 ⭐</span>
                </div>
                <div class="bg-blue-100 border-2 border-blue-300 rounded-xl p-4 flex justify-between items-center">
                    <span class="text-md font-bold text-gray-700"><i class="fa-solid fa-chart-line text-blue-500 mr-1"></i> 上傳後總累積星星：</span>
                    <span id="predictedTotal" class="text-2xl font-black text-blue-600">0 ⭐</span>
                </div>
            </div>

            <!-- 今日行為引導 -->
            <div>
                <h2 class="text-lg font-bold text-red-700 mb-3 border-b-2 border-red-200 pb-1">
                    <i class="fa-solid fa-triangle-exclamation text-red-500 mr-1"></i> 今日行為引導 (若無則免填)
                </h2>
                <div class="space-y-2">
                    <textarea id="badBehaviorLog" rows="2" placeholder="今天有需要引導的地方嗎？" class="w-full p-2 border-2 border-gray-300 rounded-lg focus:border-red-500 outline-none text-sm"></textarea>
                </div>
            </div>

            <!-- 父母讚美與重點 -->
            <div>
                <h2 class="text-lg font-bold text-indigo-700 mb-3 border-b-2 border-indigo-200 pb-1">
                    <i class="fa-solid fa-heart text-pink-500 mr-1"></i> 讚美事項
                </h2>
                <textarea id="parentNotes" rows="2" placeholder="寫下今天軒軒最棒的地方..." class="w-full p-2 border-2 border-gray-300 rounded-lg focus:border-indigo-500 outline-none text-sm"></textarea>
            </div>

            <!-- 提交按鈕 -->
            <button type="submit" id="submitBtn" class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold rounded-xl shadow-lg hover:from-purple-600 hover:to-pink-600 transition transform active:scale-95 text-lg flex items-center justify-center">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i> 上傳紀錄至 Notion
            </button>
        </form>
    </div>

    <!-- 設定彈窗 -->
    <div id="settingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 border-4 border-purple-400">
            <div class="flex justify-between items-center mb-4 pb-2 border-b">
                <h3 class="text-lg font-bold text-purple-700"><i class="fa-solid fa-gears mr-1"></i> 系統連線設定</h3>
                <button id="closeSettings" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Make Webhook 網址</label>
                    <input type="text" id="webhookUrl" placeholder="https://hook.us1.make.com/..." class="w-full p-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 outline-none text-xs">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">目前已累積星星數 (基準)</label>
                    <input type="number" id="baseStars" min="0" value="0" class="w-full p-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 outline-none">
                </div>
                <button id="saveSettings" class="w-full py-2 bg-purple-600 text-white font-bold rounded-lg shadow hover:bg-purple-700 transition">
                    儲存設定
                </button>
            </div>
        </div>
    </div>

    <!-- 通知彈窗 -->
    <div id="notifModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-6 text-center border-4" id="notifBorder">
            <div id="notifIcon" class="text-5xl mb-3"></div>
            <h3 id="notifTitle" class="text-xl font-bold mb-2"></h3>
            <p id="notifMsg" class="text-gray-600 text-sm mb-4"></p>
            <button id="closeNotif" class="px-6 py-2 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-700 transition">
                確定
            </button>
        </div>
    </div>

    <script>
        document.getElementById('logDate').valueAsDate = new Date();

        const STORAGE_KEYS = {
            WEBHOOK: 'xuan_webhook_url',
            BASE_STARS: 'xuan_base_stars'
        };

        const openSettingsBtn = document.getElementById('openSettings');
        const closeSettingsBtn = document.getElementById('closeSettings');
        const settingsModal = document.getElementById('settingsModal');
        const webhookInput = document.getElementById('webhookUrl');
        const baseStarsInput = document.getElementById('baseStars');
        const saveSettingsBtn = document.getElementById('saveSettings');

        const notifModal = document.getElementById('notifModal');
        const notifBorder = document.getElementById('notifBorder');
        const notifIcon = document.getElementById('notifIcon');
        const notifTitle = document.getElementById('notifTitle');
        const notifMsg = document.getElementById('notifMsg');
        const closeNotifBtn = document.getElementById('closeNotif');

        const checkboxes = document.querySelectorAll('.behavior-checkbox');
        const extraStarsInput = document.getElementById('extraStars');
        
        // 兌換獎勵連動元素
        const rewardPresetSelect = document.getElementById('rewardPreset');
        const customRewardGroup = document.getElementById('customRewardGroup');
        const customRewardNameInput = document.getElementById('customRewardName');
        const deductStarsInput = document.getElementById('deductStars');
        
        const todayTotalDisplay = document.getElementById('todayTotal');
        const predictedTotalDisplay = document.getElementById('predictedTotal');
        const logForm = document.getElementById('logForm');
        const submitBtn = document.getElementById('submitBtn');

        function loadSettings() {
            webhookInput.value = localStorage.getItem(STORAGE_KEYS.WEBHOOK) || '';
            baseStarsInput.value = localStorage.getItem(STORAGE_KEYS.BASE_STARS) || '0';
            calculateStars();
        }

        openSettingsBtn.addEventListener('click', () => { loadSettings(); settingsModal.classList.remove('hidden'); });
        closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));

        saveSettingsBtn.addEventListener('click', () => {
            localStorage.setItem(STORAGE_KEYS.WEBHOOK, webhookInput.value.trim());
            localStorage.setItem(STORAGE_KEYS.BASE_STARS, baseStarsInput.value || '0');
            settingsModal.classList.add('hidden');
            calculateStars();
            showNotification('success', '設定已儲存', '您的連線與點數基準已成功更新。');
        });

        function showNotification(type, title, message) {
            notifTitle.innerText = title;
            notifMsg.innerText = message;
            if (type === 'success') {
                notifBorder.className = "bg-white w-full max-w-xs rounded-2xl shadow-2xl p-6 text-center border-4 border-green-400";
                notifIcon.innerHTML = "🎉";
                notifIcon.className = "text-5xl mb-3 text-green-500";
            } else {
                notifBorder.className = "bg-white w-full max-w-xs rounded-2xl shadow-2xl p-6 text-center border-4 border-red-400";
                notifIcon.innerHTML = "⚠️";
                notifIcon.className = "text-5xl mb-3 text-red-500";
            }
            notifModal.classList.remove('hidden');
        }

        closeNotifBtn.addEventListener('click', () => notifModal.classList.add('hidden'));

        // 獎勵選單變動處理
        rewardPresetSelect.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const autoStars = parseInt(selectedOption.getAttribute('data-stars')) || 0;
            
            if (this.value === 'custom') {
                // 顯示自訂輸入欄位
                customRewardGroup.classList.remove('hidden');
                deductStarsInput.value = 0;
                deductStarsInput.readOnly = false;
            } else {
                // 隱藏自訂輸入欄位並自動帶入數值
                customRewardGroup.classList.add('hidden');
                customRewardNameInput.value = '';
                deductStarsInput.value = autoStars;
                deductStarsInput.readOnly = (this.value !== 'none');
            }
            calculateStars();
        });

        // 星星即時計算 (賺取 - 扣除)
        function calculateStars() {
            let earnStars = 0;
            checkboxes.forEach(cb => {
                if (cb.checked) earnStars += parseInt(cb.value);
            });
            earnStars += parseInt(extraStarsInput.value) || 0;
            
            const deductStars = parseInt(deductStarsInput.value) || 0;
            const netTodayStars = earnStars - deductStars; // 今日淨得 (可能為負數)
            
            todayTotalDisplay.innerText = (netTodayStars >= 0 ? "+" : "") + netTodayStars + " ⭐";

            const baseStars = parseInt(localStorage.getItem(STORAGE_KEYS.BASE_STARS)) || 0;
            const newTotal = baseStars + netTodayStars;
            predictedTotalDisplay.innerText = newTotal + " ⭐";

            return { todayTotal: netTodayStars, newTotal, deductStars };
        }

        checkboxes.forEach(cb => cb.addEventListener('change', calculateStars));
        extraStarsInput.addEventListener('input', calculateStars);
        deductStarsInput.addEventListener('input', calculateStars);

        // 表單提交
        logForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const webhookUrl = localStorage.getItem(STORAGE_KEYS.WEBHOOK);
            if (!webhookUrl) {
                showNotification('error', '請先完成設定', '請點擊右上角「齒輪」，設定您的 Make Webhook 網址。');
                return;
            }

            const starData = calculateStars();
            
            // 自動計算與建立漂亮的兌換標題
            let finalHighlight = document.getElementById('todayHighlight').value.trim();
            const rewardValue = rewardPresetSelect.value;
            
            if (starData.deductStars > 0) {
                let rewardName = "";
                if (rewardValue === 'custom') {
                    rewardName = customRewardNameInput.value.trim() || "自訂獎勵";
                } else if (rewardValue !== 'none') {
                    // 擷取下拉選單選項文字（去除前方的圖示與星星標記）
                    const selectedText = rewardPresetSelect.options[rewardPresetSelect.selectedIndex].text;
                    rewardName = selectedText.substring(selectedText.indexOf('】') + 1);
                } else {
                    rewardName = "手動扣點";
                }
                
                finalHighlight = `【🎁 兌換：${rewardName} (-${starData.deductStars}⭐)】` + finalHighlight;
            }
            
            const formData = {
                "日期": document.getElementById('logDate').value,
                "本日亮點": finalHighlight,
                "今日獲得星星": starData.todayTotal,
                "總累積星星": starData.newTotal,
                "行為引導": document.getElementById('badBehaviorLog').value.trim(),
                "讚美事項": document.getElementById('parentNotes').value.trim()
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> 正在傳送至 Notion...';

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(response => {
                if (response.ok) {
                    localStorage.setItem(STORAGE_KEYS.BASE_STARS, starData.newTotal);
                    showNotification('success', '成功上傳！', '今日紀錄與扣點已同步更新至 Notion！');
                    logForm.reset();
                    // 重置扣點與自訂區塊
                    customRewardGroup.classList.add('hidden');
                    deductStarsInput.readOnly = false;
                    document.getElementById('logDate').valueAsDate = new Date();
                    calculateStars();
                } else {
                    throw new Error('伺服器錯誤');
                }
            })
            .catch(error => {
                console.error(error);
                showNotification('error', '傳送失敗', '請確認 Webhook 網址是否正確或 Make 是否處於啟動狀態。');
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i> 上傳紀錄至 Notion';
            });
        });

        loadSettings();
    </script>
</body>
</html>
